<div class="relative bg-white dark:bg-gray-900 rounded-2xl shadow-sm hover:shadow-xl overflow-hidden flex flex-col items-center justify-between p-5 group transition-all duration-300 hover:-translate-y-1.5 border border-gray-100 dark:border-gray-800 cursor-pointer h-full"
    (click)="comprar(producto()!)">

    <picture
        class="w-full h-44 flex items-center justify-center mb-5 overflow-hidden rounded-xl bg-gray-50 dark:bg-gray-800 border border-gray-100 dark:border-gray-700">
        <img [src]="producto().imagenUrl || 'placeholder.jpg'" alt="{{producto().nombre}}"
            class="object-contain h-full w-auto p-2 transition-transform duration-300 group-hover:scale-110" width="240"
            height="176" />
    </picture>

    <div class="w-full flex flex-col flex-1 mb-4">
        <span
            class="block text-lg font-semibold text-gray-900 dark:text-gray-100 mb-1 leading-tight truncate group-hover:text-cyan-700">
            {{producto().nombre}}
        </span>

        <span class="block text-2xl font-extrabold text-gray-950 dark:text-white mb-3 leading-none">
            {{ producto().precio | currency:'PEN':'symbol':'1.2-2' }}
        </span>
    </div>

    <button (click)="agregarProducto.emit(producto()); $event.stopPropagation();"
        class="w-full px-6 py-3 rounded-xl bg-cyan-600 text-white font-semibold shadow hover:bg-cyan-700 transition transform hover:scale-[1.03] flex items-center justify-center gap-2 text-base">
        🛒 Añadir al carrito
    </button>

</div>
